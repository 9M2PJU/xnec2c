<svg xmlns="http://www.w3.org/2000/svg" viewBox="1.5 1.5 13 13">
  <!-- top face: parallel edges, 2:1 isometric ratio -->
  <polygon points="8,2 14,5 8,8 2,5"
           fill="none" stroke="currentColor" stroke-width="1"/>
  <!-- left face -->
  <polygon points="2,5 8,8 8,14 2,11"
           fill="none" stroke="currentColor" stroke-width="1"/>
  <!-- right face -->
  <polygon points="14,5 14,11 8,14 8,8"
           fill="none" stroke="currentColor" stroke-width="1"/>
</svg>
