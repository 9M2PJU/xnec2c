# Per-purpose frequency-plot line widths, in pixels.  Width varies by element
# purpose, never by theme, so it is a single global axis read by every theme.
# The per-panel density scale multiplies these at draw time.  A user copy in
# ~/.xnec2c/freqplots_widths.ini overrides present keys; missing keys keep
# these defaults.
[widths]
w_grid = 1.0
w_grid_emphasis = 1.6
w_axis = 2.0
w_trace = 2.0
w_cursor = 2.0
